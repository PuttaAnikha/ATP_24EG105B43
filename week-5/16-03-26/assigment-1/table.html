<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Grades Table</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<table>
  <tr>
    <th colspan="2">Subject</th>
    <th>John Doe</th>
    <th>Miriam Luther</th>
  </tr>

  <!-- Biology -->
  <tr>
    <td rowspan="2">Biology</td>
    <td>Practical</td>
    <td>A</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A+</td>
    <td>A</td>
  </tr>

  <!-- Chemistry -->
  <tr>
    <td rowspan="2">Chemistry</td>
    <td>Practical</td>
    <td>B</td>
    <td>C</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A</td>
    <td>C+</td>
  </tr>

  <!-- Physics -->
  <tr>
    <td rowspan="2">Physics</td>
    <td>Practical</td>
    <td>A</td>
    <td>A</td>
  </tr>
  <tr>
    <td>Theory</td>
    <td>A-</td>
    <td>A-</td>
  </tr>

</table>

</body>
</html>
